name: Build Lite Server APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y \
          autoconf automake libtool pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev \
          cmake libffi-dev libssl-dev libltdl-dev \
          unzip
    
    - name: Cache Buildozer
      uses: actions/cache@v4
      with:
        path: |
          ./.buildozer
          ~/.buildozer
        key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          buildozer-${{ runner.os }}-
    
    - name: Install Python tools
      run: |
        pip install --upgrade pip setuptools
        pip install buildozer==1.5.1 Cython==0.29.36
    
    - name: Build APK
      run: |
        export BUILDOZER_WARN_ON_ROOT=1
        buildozer android debug 2>&1 | tee build_log.txt || true
        echo "Build step finished with exit code: $?"
    
    - name: Show last 500 lines of log
      if: always()
      run: |
        echo "=== LAST 500 LINES ==="
        if [ -f build_log.txt ]; then
          tail -500 build_log.txt
        else
          echo "No log file found - build may have failed before starting"
          echo "=== Checking for any logs ==="
          find . -name "*.log" -o -name "*.txt" 2>/dev/null | head -20
        fi
    
    - name: Check APK exists
      if: always()
      run: |
        ls -la bin/ 2>/dev/null || echo "No bin directory"
        find . -name "*.apk" 2>/dev/null || echo "No APK found"
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: lite-server-apk
        path: bin/*.apk
    
    - name: Upload build log
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-log
        path: build_log.txt
    
    - name: Create Release
      if: github.event_name == 'workflow_dispatch'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.${{ github.run_number }}
        files: bin/*.apk
