name: Build Lite Server APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y \
          autoconf automake libtool pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev \
          cmake libffi-dev libssl-dev libltdl-dev \
          openjdk-17-jdk unzip
    
    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
    
    - name: Install Python tools
      run: |
        pip install --upgrade pip setuptools
        pip install buildozer Cython==0.29.36
    
    - name: Build APK (full log)
      run: |
        buildozer android debug 2>&1 | tee build_log.txt
      continue-on-error: true
    
    - name: Show last 200 lines of log
      if: always()
      run: |
        echo "=== LAST 200 LINES ==="
        tail -200 build_log.txt || echo "No log file"
    
    - name: Check APK exists
      run: |
        ls -la bin/ 2>/dev/null || echo "No bin directory"
        find . -name "*.apk" 2>/dev/null || echo "No APK found"
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: lite-server-apk
        path: bin/*.apk
    
    - name: Upload build log
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-log
        path: build_log.txt
    
    - name: Create Release
      if: github.event_name == 'workflow_dispatch'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.${{ github.run_number }}
        files: bin/*.apk
