name: Build Lite Server APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y autoconf automake libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev libltdl-dev
        pip install --upgrade pip
        pip install buildozer Cython==0.29.36
    
    - name: Build with Buildozer
      run: |
        buildozer android debug 2>&1 | tail -100
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: lite-server-apk
        path: bin/*.apk
    
    - name: Create Release
      if: github.event_name == 'workflow_dispatch'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.${{ github.run_number }}
        files: bin/*.apk
